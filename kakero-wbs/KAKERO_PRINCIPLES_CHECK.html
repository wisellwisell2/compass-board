<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KAKERO 原則確認</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%23111827"/><path d="M19 45V19h7v10l11-10h9L33 31l14 14H36L26 34v11z" fill="%23fffdf7"/><circle cx="49" cy="15" r="5" fill="%23f59e0b"/></svg>'>
  <style>
    :root {
      --ink: #111827;
      --paper: #fffdf7;
      --line: #e5e7eb;
      --muted: #6b7280;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --gold: #f59e0b;
      --green: #047857;
      --green-soft: #ecfdf5;
      --rose: #be123c;
      --rose-soft: #fff1f2;
      --shadow: 0 10px 24px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: #f8fafc;
      color: var(--ink);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(100%, 390px);
      margin: 0 auto;
      padding: 16px 14px 112px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand > div:last-child {
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 46px;
      height: 46px;
      border: 1px solid var(--ink);
      border-radius: 14px;
      background: var(--ink);
      color: var(--paper);
      box-shadow: 4px 4px 0 var(--gold);
      font-size: 23px;
      font-weight: 900;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      text-wrap: balance;
    }

    .lead {
      margin: 12px 0 0;
      color: #374151;
      font-size: 14px;
      line-height: 1.7;
      text-wrap: pretty;
      overflow-wrap: anywhere;
    }

    .robot {
      margin-top: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: white;
      padding: 12px;
      color: #374151;
      font-size: 13px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .robot strong {
      color: var(--ink);
    }

    .section-title {
      margin: 18px 2px 10px;
      color: #374151;
      font-size: 13px;
      font-weight: 800;
    }

    .checklist {
      display: grid;
      gap: 10px;
    }

    .check {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 12px;
    }

    .check > span {
      min-width: 0;
    }

    .check input {
      width: 22px;
      height: 22px;
      margin: 1px 0 0;
      accent-color: var(--blue);
    }

    .check-title {
      display: block;
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .check-desc {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
      text-wrap: pretty;
      overflow-wrap: anywhere;
    }

    .danger {
      border-color: #fecdd3;
      background: var(--rose-soft);
    }

    .approve-box {
      position: sticky;
      bottom: 0;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px 8px 0 0;
      background: rgba(255, 253, 247, 0.98);
      padding: 12px;
      box-shadow: 0 -8px 22px rgba(17, 24, 39, 0.08);
    }

    .approve {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 800;
      cursor: pointer;
      padding: 10px 12px;
      line-height: 1.35;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .approve:focus-visible {
      outline: 3px solid #bfdbfe;
      outline-offset: 2px;
    }

    .message {
      min-height: 22px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    .message.ok {
      color: var(--green);
      font-weight: 800;
    }

    .message.warn {
      color: var(--rose);
      font-weight: 800;
    }

    .footer {
      margin: 16px 2px 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="brand">
        <div class="mark" aria-hidden="true">K</div>
        <div>
          <h1>これはKAKEROか？</h1>
          <p class="lead">実装・レビュー前に、KAKEROの芯からズレていないかを短く確認するページ。</p>
        </div>
      </div>
      <div class="robot">
        <strong>キコウカクンチェック。</strong><br>
        ヨクデキタ機能デモ、デモ、KAKEROジャナイナラ戻ス。
      </div>
    </section>

    <h2 class="section-title">原則チェック</h2>
    <section class="checklist" aria-label="KAKERO principles checklist">
      <label class="check">
        <input type="checkbox">
        <span>
          <span class="check-title">欠損に、届け</span>
          <p class="check-desc">足りないものを抱えた人に、ちゃんと届く変更か。</p>
        </span>
      </label>

      <label class="check">
        <input type="checkbox">
        <span>
          <span class="check-title">盤面はユーザーのもの</span>
          <p class="check-desc">人生データを人質にしていないか。見て、直して、持ち出せるか。</p>
        </span>
      </label>

      <label class="check">
        <input type="checkbox">
        <span>
          <span class="check-title">催促しない、赤くしない、責めない</span>
          <p class="check-desc">遅れや未完了を罰にせず、静かにずらす/受け入れる設計か。</p>
        </span>
      </label>

      <label class="check">
        <input type="checkbox">
        <span>
          <span class="check-title">会話ログではなく盤面が記憶する</span>
          <p class="check-desc">継続性をログ再送ではなく、カード・状態・記憶項目で作っているか。</p>
        </span>
      </label>

      <label class="check">
        <input type="checkbox">
        <span>
          <span class="check-title">遊びは入口、人生整理はpayoff</span>
          <p class="check-desc">かわいい/楽しいだけで終わらず、人生が盤面になる価値へ戻っているか。</p>
        </span>
      </label>

      <label class="check danger">
        <input type="checkbox">
        <span>
          <span class="check-title">ゲームのために人生マップを嘘にしない</span>
          <p class="check-desc">報酬のために進捗・けんこうポイント・カード数を盛りたくなる設計ではないか。</p>
        </span>
      </label>

      <label class="check">
        <input type="checkbox">
        <span>
          <span class="check-title">ToDoではなく、人生攻略マップ＋相棒</span>
          <p class="check-desc">単なるタスク消化ではなく、依存・フェーズ・生活状態・相棒感があるか。</p>
        </span>
      </label>
    </section>

    <section class="approve-box" aria-label="approval">
      <button class="approve" type="button" id="approveButton">この変更はKAKEROの原則を守っています</button>
      <p class="message" id="message">保存はしません。レビュー前の指差し確認です。</p>
    </section>

    <p class="footer">KAKERO Principles Check / static review page</p>
  </main>

  <script>
    const button = document.getElementById('approveButton');
    const message = document.getElementById('message');
    button.addEventListener('click', () => {
      const checks = Array.from(document.querySelectorAll('input[type="checkbox"]'));
      const done = checks.filter(check => check.checked).length;
      if (done === checks.length) {
        message.className = 'message ok';
        message.textContent = 'ヨシ。KAKEROノ芯、守ッテマス。';
      } else {
        message.className = 'message warn';
        message.textContent = `未確認 ${checks.length - done} 件。雑ニ進メナイ。`;
      }
    });
  </script>
</body>
</html>
