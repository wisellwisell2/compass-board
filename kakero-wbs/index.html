<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ff9f43">
<title>🗺️ KAKERO WBS — すごろくマップ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#26233f;
  --ink-soft:#5a567a;
  --ink-dim:#a39ec2;
  --paper:#fffdf8;
  --accent:#ff9f43;
  --accent-deep:#f0772b;
  --glow:#ffd166;
  --line:#efe6d6;
  --card-shadow:0 2px 5px rgba(38,30,80,.10), 0 8px 22px rgba(38,30,80,.10);
  --radius:16px;
  --mono:'JetBrains Mono', ui-monospace, monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDGothic','Yu Gothic',sans-serif;
  font-size:14px;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% -8%, rgba(255,209,102,.35), transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(168,221,240,.30), transparent 45%),
    #fff8ee;
  min-height:100vh;
}
button,input{font-family:inherit;}
button{cursor:pointer;}
:focus-visible{outline:3px solid var(--glow); outline-offset:2px; border-radius:8px;}
a{color:var(--accent-deep); text-decoration:none;}

/* ---------- ヒーロー ---------- */
.hero{
  padding:calc(16px + env(safe-area-inset-top)) 16px 20px;
  background:linear-gradient(160deg, #ffe6bf 0%, #ffcf9c 45%, #ffb37a 100%);
  border-radius:0 0 26px 26px;
  box-shadow:0 6px 24px rgba(240,119,43,.18);
}
.hero-top{display:flex; align-items:center; gap:12px;}
.hero-emblem{
  width:46px; height:46px; flex:none; border-radius:14px;
  background:rgba(255,255,255,.55);
  display:grid; place-items:center; font-size:24px;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.7);
}
.hero-text{flex:1; min-width:0;}
.hero-text h1{margin:0; font-size:18px; font-weight:900; letter-spacing:.02em; color:#3c2a16;}
.hero-text p{margin:2px 0 0; font-size:11.5px; color:#7a5a36; line-height:1.5;}
.back-link{
  flex:none; font-size:11.5px; font-weight:700; color:#7a4316;
  background:rgba(255,255,255,.6); border-radius:999px; padding:7px 13px;
  display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
}
.back-link:hover{background:rgba(255,255,255,.85);}

/* すごろくジャーニーバー */
.journey{margin-top:18px; padding:0 4px;}
.journey-meta{display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:#7a4316; margin-bottom:8px;}
.journey-track{position:relative; height:8px; border-radius:999px; background:rgba(255,255,255,.45); margin:0 4px;}
.journey-fill{position:absolute; inset:0; border-radius:999px; background:linear-gradient(90deg, var(--glow), var(--accent-deep)); width:0%; transition:width .6s cubic-bezier(.2,.8,.2,1);}
.journey-flag{
  position:absolute; top:-9px; transform:translateX(-50%);
  font-size:13px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.25));
}
.journey-sun{
  position:absolute; top:-15px; transform:translateX(-50%); font-size:24px;
  transition:left .6s cubic-bezier(.2,.8,.2,1);
  filter:drop-shadow(0 2px 4px rgba(80,40,0,.35));
}

/* ---------- フィルタバー ---------- */
.filterbar{
  position:sticky; top:0; z-index:30;
  background:rgba(255,248,238,.88);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:10px 14px;
}
.search-box{
  display:flex; align-items:center; gap:7px;
  border:1.5px solid var(--line); border-radius:999px; background:#fff;
  padding:8px 14px; margin-bottom:8px;
}
.search-box input{border:none; background:transparent; outline:none; width:100%; font-size:13px; color:var(--ink);}
.search-box svg{flex:none; opacity:.45;}
.chip-row{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip-row+.chip-row{margin-top:6px;}
.fchip{
  flex:none; white-space:nowrap;
  border:1.5px solid var(--line); border-radius:999px; background:#fff;
  color:var(--ink-soft); padding:6px 12px; font-size:12px; font-weight:700;
  transition:all .15s;
}
.fchip.on{background:linear-gradient(135deg, var(--accent), var(--accent-deep)); color:#fff; border-color:transparent; box-shadow:0 3px 10px rgba(240,119,43,.35);}
.fchip:hover:not(.on){border-color:var(--accent); color:var(--accent-deep);}

/* ---------- レーン（フェーズ） ---------- */
#board{padding:16px 0 60px;}
.lane{
  --lc:#FFE0A3;
  margin:0 14px 14px;
  border-radius:20px;
  background:linear-gradient(135deg, color-mix(in srgb, var(--lc) 26%, #fff), color-mix(in srgb, var(--lc) 12%, #fff));
  border:1.5px solid color-mix(in srgb, var(--lc) 55%, transparent);
  padding:13px 0 15px;
}
.lane.dark{
  --lc:#2D3561;
  background:linear-gradient(135deg, #2D3561, #3a3f7a);
  border-color:#2D3561;
}
.lane-head{display:flex; align-items:center; gap:10px; padding:0 14px;}
.lane-emoji{
  width:38px; height:38px; flex:none; border-radius:12px;
  background:#fff; display:grid; place-items:center; font-size:19px;
  box-shadow:var(--card-shadow);
}
.lane-text{flex:1; min-width:0;}
.lane-text h2{margin:0; font-size:13.5px; font-weight:900; line-height:1.4;}
.lane-text p{margin:1px 0 0; font-size:11px; color:var(--ink-soft); line-height:1.5;}
.lane.dark .lane-text h2{color:#fff;}
.lane.dark .lane-text p{color:#c8c9ec;}
.lane-count{
  flex:none; font-family:var(--mono); font-size:11px; font-weight:700;
  background:rgba(255,255,255,.7); border-radius:999px; padding:4px 9px; color:var(--ink-soft);
}
.lane.dark .lane-count{background:rgba(255,255,255,.16); color:#fff;}
.lane-bar{height:5px; border-radius:999px; background:rgba(255,255,255,.55); margin:9px 14px 0; overflow:hidden;}
.lane.dark .lane-bar{background:rgba(255,255,255,.18);}
.lane-bar i{display:block; height:100%; background:linear-gradient(90deg, var(--glow), var(--accent-deep)); transition:width .5s;}

.lane-cards{
  display:flex; gap:10px; overflow-x:auto; padding:10px 14px 4px;
  -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity;
}
@media (min-width:900px){
  .lane-cards{flex-wrap:wrap; overflow:visible;}
  .lane-cards .card{width:236px;}
}
.empty-lane{
  flex:none; border:1.5px dashed var(--line); border-radius:12px; padding:14px 18px;
  font-size:11.5px; color:var(--ink-dim); background:rgba(255,255,255,.5);
}
.lane.dark .empty-lane{border-color:rgba(255,255,255,.25); color:#a9abd6; background:rgba(255,255,255,.06);}

/* ---------- カード ---------- */
.card{
  position:relative; flex:none; width:200px; scroll-snap-align:start;
  text-align:left; background:var(--paper); color:var(--ink);
  border:1.5px solid rgba(255,255,255,.9);
  border-radius:14px; box-shadow:var(--card-shadow);
  padding:10px 12px; transition:transform .15s, box-shadow .15s;
}
.card:hover{transform:translateY(-2px);}
.card.done{opacity:.55;}
.card.done .card-title{text-decoration:line-through; color:var(--ink-dim);}
.card.selected{box-shadow:0 0 0 3px var(--glow), 0 0 20px 3px rgba(255,209,102,.5), var(--card-shadow); transform:translateY(-2px);}
.card.related-dep{box-shadow:0 0 0 3px var(--accent), 0 0 16px rgba(240,119,43,.3), var(--card-shadow);}
.card.related-next{box-shadow:0 0 0 3px #7c9eff, 0 0 16px rgba(124,158,255,.3), var(--card-shadow);}
.card-top{display:flex; align-items:center; justify-content:space-between; gap:6px;}
.card-id{font-family:var(--mono); font-size:11px; color:var(--ink-dim); font-weight:700;}
.card-status{font-size:15px; line-height:1;}
.card-title{margin-top:4px; font-size:13px; font-weight:900; line-height:1.5;}
.card-deliv{margin-top:5px; font-size:11px; color:var(--ink-soft); display:flex; gap:5px; align-items:flex-start; line-height:1.5;}
.card-meta{display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;}
.tag{
  display:inline-flex; align-items:center; gap:3px;
  border-radius:999px; padding:3px 8px; font-size:10px; font-weight:700;
  background:#f4efe3; color:var(--ink-soft); font-family:var(--mono);
}
.tag.kind-決定済み{background:rgba(159,227,192,.45); color:#1f6e4d;}
.tag.kind-PoC必要{background:rgba(255,224,163,.55); color:#9a6a14;}
.tag.kind-未確定{background:rgba(240,184,217,.5); color:#a32e6b;}
.tag.kind-後回し{background:#ecebf3; color:#6a6480;}

/* ---------- 依存ライン ---------- */
#arrows{position:fixed; inset:0; pointer-events:none; z-index:5; width:100%; height:100%;}

/* ---------- 詳細シート ---------- */
.scrim{
  position:fixed; inset:0; background:rgba(40,30,20,.35); z-index:50;
  backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity .2s;
}
.scrim.show{opacity:1; pointer-events:auto;}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:51;
  max-height:88vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
  background:var(--paper); border-radius:22px 22px 0 0;
  padding:10px 18px calc(22px + env(safe-area-inset-bottom));
  box-shadow:0 -10px 40px rgba(40,30,20,.25);
  transform:translateY(100%); transition:transform .28s cubic-bezier(.34,1.3,.64,1);
}
.sheet.show{transform:translateY(0);}
.sheet .grab{width:42px; height:5px; border-radius:3px; background:#ecdfca; margin:6px auto 12px;}
.sheet .sub-id{font-family:var(--mono); font-size:11.5px; color:var(--ink-dim); font-weight:700;}
.sheet h2{margin:4px 0 0; font-size:17px; font-weight:900; line-height:1.5;}
.sheet .meta{display:flex; flex-wrap:wrap; gap:6px; margin:12px 0 4px;}
.field{border-top:1px solid var(--line); padding:12px 0;}
.field-label{display:block; margin-bottom:6px; font-size:10.5px; font-weight:900; letter-spacing:.1em; color:var(--ink-dim); text-transform:uppercase; font-family:var(--mono);}
.field-value{margin:0; font-size:13px; line-height:1.7; color:var(--ink);}
.dep-chip{
  border:1.5px solid var(--line); background:#fff; color:var(--ink);
  border-radius:10px; padding:6px 11px; font-size:12px; font-weight:700;
  display:inline-flex; align-items:center; gap:6px; font-family:var(--mono);
}
.dep-chip:hover{border-color:var(--accent); color:var(--accent-deep);}
.dep-chip.blocking{border-color:var(--accent); color:var(--accent-deep); background:rgba(255,224,163,.35);}
.muted{color:var(--ink-dim); font-size:12px;}

/* 完了トグル */
.toggle-row{
  display:flex; align-items:center; gap:12px; margin-top:14px;
  border-top:1px solid var(--line); padding-top:14px; font-size:13.5px; font-weight:900; color:var(--ink);
}
.switch{position:relative; width:46px; height:26px; flex:none;}
.switch input{position:absolute; inset:0; opacity:0; margin:0; cursor:pointer;}
.switch .track{
  position:absolute; inset:0; border-radius:999px; background:#ecdfca;
  transition:background .2s;
}
.switch .thumb{
  position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
  background:#fff; box-shadow:0 2px 4px rgba(0,0,0,.2); transition:transform .2s;
}
.switch input:checked + .track{background:linear-gradient(135deg, var(--accent), var(--accent-deep));}
.switch input:checked + .track + .thumb{transform:translateX(20px);}

/* ---------- トースト ---------- */
#toastWrap{
  position:fixed; left:0; right:0; bottom:18px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  z-index:100; pointer-events:none;
}
.toast{
  background:#2f2a44; color:#fff; border:none;
  padding:9px 18px; border-radius:999px; font-size:12.5px; font-weight:700;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes toastIn{from{transform:translateY(14px) scale(.9); opacity:0;}}
.toast.out{transition:opacity .3s, transform .3s; opacity:0; transform:translateY(8px);}

@media print{
  .filterbar, #toastWrap, .sheet, .scrim, #arrows, .journey{display:none;}
  body{background:#fff; color:#000;}
  .lane,.card{border-color:#ccc; background:#fff; box-shadow:none;}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-top">
    <div class="hero-emblem">🗺️</div>
    <div class="hero-text">
      <h1>KAKERO WBS — すごろくマップ</h1>
      <p>PoC → 商品 walking skeleton → 技術GO / 体験GO / 事業GO 判定までの道のり</p>
    </div>

  </div>
  <div class="journey">
    <div class="journey-meta">
      <span id="journeyLabel"></span>
      <span id="journeyPct"></span>
    </div>
    <div class="journey-track" id="journeyTrack">
      <div class="journey-fill" id="journeyFill"></div>
      <div class="journey-sun" id="journeySun">☀️</div>
    </div>
  </div>
</header>

<div class="filterbar">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="searchInput" type="search" placeholder="検索: Haiku / けんこう / 価格 ...">
  </div>
  <div class="chip-row" id="kindChips"></div>
  <div class="chip-row" id="statusChips"></div>
</div>

<main id="board"></main>

<svg id="arrows"><defs>
  <marker id="arrow-dep" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 Z" fill="#f0772b"/>

  <marker id="arrow-next" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

</defs></svg>

<div class="scrim" id="scrim"></div>
<section class="sheet" id="sheet" aria-hidden="true"><div class="grab"></div><div id="sheetBody"></div></section>

<div id="toastWrap"></div>

<script>
'use strict';

/* ================= データ ================= */
const phases = [

const tasks = [
  ['0.1','0','決定済み','決定ログを作る','DECISION_LOG.md',[], '最新優先ルール、決定済み、前提、判断日が記録されている','0.5'],
  ['0.2','0','決定済み','未決事項台帳を作る','OPEN_QUESTIONS.md',[], '事業判断・価格・仕様未確定がカテゴリ別に整理されている','0.5'],

  ['0.4','0','決定済み','WBSを確定する','WBS.md',['0.1','0.2','0.3'], '決定済み/未確定/PoC必要/後回しが分離され、各タスクに成果物・依存・完了条件がある','1'],

  ['1.1','1','PoC必要','KAKERO内部スキーマ v0.1 を定義する','KAKERO_DATA_v0.1.md',['0.4'], 'nodes, edges, health_map, memory_items, metadata の役割が定義されている','1-2'],

  ['2.5','2','PoC必要','内部スキーマへの変換を検証する','変換PoC',['2.2','2.3','2.4'], 'Haiku出力が nodes/edges/metadata に破綻なく入る','1-2'],
  ['2.6','2','PoC必要','Haiku採用/上位モデル再判定を行う','技術判定メモ',['2.2','2.3','2.4','2.5'], 'Haiku継続、プロンプト修正、Sonnet再検証のいずれかが判断できる','0.5'],

  ['3.3','3','PoC必要','10カード表示を検証する','10カード表示PoC',['3.2'], '10個前後並べても人生コンパスっぽい俯瞰が崩れない','1-2'],
  ['3.4','3','PoC必要','状態表示ルールを反映する','状態表示PoC',['3.2'], '未着手/実行中/完了/大達成/未解放/待機/メモあり等を識別できる','1-2'],
  ['3.5','3','PoC必要','手編集PoCを作る','編集PoC',['3.2'], 'カードの編集、移動、削除、状態変更ができる','2-4'],
  ['3.6','3','PoC必要','編集結果を盤面に保存/復元する','保存復元PoC',['3.5'], 'リロード後も編集結果が残る。保存方式は作りやすさ優先で仮置き','1-2'],
  ['4.1','4','PoC必要','けんこうマップの最小データ構造を定義する','health_map仕様',['1.1'], '生活/仕事/心身/金/家族/余白などの反映先が定義されている','1-2'],
  ['4.2','4','PoC必要','カードからけんこうマップへ反映する','けんこう反映PoC',['2.5','4.1'], 'カード追加でマップ項目・総合点・今月モード候補が変化する','2-4'],
  ['4.3','4','PoC必要','単なるToDo化していないか検証する','体験レビュー結果',['4.2'], 'カードとマップの関係が意味ある状態変化として見える','1'],
  ['4.4','4','未確定','初期自動反映精度を調整する','調整方針メモ',['4.2','OQ'], '自動反映の深さをWSで必要な最低限に抑えられている','1-2'],
  ['5.1','5','決定済み','LP/入口を作る','入口画面',['3.2'], 'KAKEROが何か、初回体験へ進めることが分かる','2-4'],
  ['5.2','5','未確定','LPコピーを仮置きする','仮コピー',['5.1','OQ'], '最終コピーを確定せず、検証用文言で入口が成立する','0.5-1'],
  ['5.3','5','決定済み','プラン/価格ページを作る','プラン/価格ページ',['5.1'], '本番決済なしで、有料エンジンの価値と無料範囲が説明されている','1-2'],
  ['5.4','5','決定済み','きこうか君チュートリアルを作る','チュートリアル導線',['2.5','5.1'], 'ヤア、ワタシガキコウカクンデス から願望入力へ進める','2-4'],
  ['5.5','5','PoC必要','10カード登録体験を通す','初回登録フロー',['5.4','3.3','4.2'], '初回体験で5-10カードを登録し、盤面化できる','3-5'],
  ['5.6','5','決定済み','覚えてほしいことリストを作る','memory_items UI',['1.1','5.4'], '10-20個程度の記憶項目を追加/編集でき、AI入力に含められる','2-4'],
  ['5.7','5','PoC必要','次回きこうか君が盤面を理解するループを作る','盤面理解PoC',['1.4','3.6','5.6'], '会話履歴なしで、既存盤面を踏まえたカード化/修正ができる','2-4'],
  ['5.8','5','未確定','今日の9タスク導線を仮実装する','今日タスク仮画面',['3.6','4.2','OQ'], '自動生成ロジック未確定のため、仮選定または手動選択で体験確認できる','2-4'],
  ['5.9','5','決定済み','WS統合テストを行う','WSテスト結果',['5.1','5.2','5.3','5.4','5.5','5.6','5.7','5.8'], '入口 -> チュートリアル -> カード化 -> コンパス/けんこう反映 -> 手編集 -> 再読込 が通る','2-3'],
  ['6.1','6','PoC必要','技術GOを判定する','技術GO判定メモ',['5.9'], 'Haiku、盤面、編集、保存、けんこう反映が通る/通らないを判断できる','1'],
  ['6.2','6','PoC必要','体験GOを判定する','体験GO判定メモ',['5.9'], '10カード前後で、こうなるのね、が出るかを判断できる','1-2'],
  ['6.3','6','未確定','事業GOを判定する','事業GO判定メモ',['5.1','5.3','5.5','OQ'], 'ICP/価格/継続/集客/粗利の未決を明示したうえで次判断に進める','1-2'],
  ['6.4','6','決定済み','次フェーズ計画を作る','次フェーズWBS',['6.1','6.2','6.3'], '本実装へ進む/PoC追加/事業検証優先/保留のいずれかが明確','1'],
].map(([id, phase, kind, title, deliverable, deps, done, effort]) => ({ id, phase, kind, title, deliverable, deps, done, effort }));

const openQuestionNote = '未確定（OPEN_QUESTIONS）: 価格・プラン / 体験・仕様 / データ・保存 / 事業GO のいずれかが先に決まる必要があるタスク。';

const KIND_META = {
  '決定済み': { emoji:'✅' },
  'PoC必要':  { emoji:'🧪' },
  '未確定':   { emoji:'❓' },
  '後回し':   { emoji:'⏸️' },
};
const STATUS_META = {
  done:    { emoji:'✅', label:'完了' },
  ready:   { emoji:'🔥', label:'今やれる' },
  blocked: { emoji:'🌙', label:'待機中' },
  open:    { emoji:'❓', label:'未決あり' },
};

/* ================= 状態 ================= */
const doneKey = 'kakero-wbs-done-v3';
const initialDone = ['0.1','0.2','0.3','0.4'];
const taskMap = new Map(tasks.map(t => [t.id, t]));
let doneIds = new Set(JSON.parse(localStorage.getItem(doneKey) || 'null') || initialDone);
let searchText = '';
let kindFilter = 'all';
let statusFilter = 'all';
let selectedId = null;

function depIds(t){ return t.deps.filter(d => taskMap.has(d)); }
function hasOpenDep(t){ return t.kind === '未確定' || t.deps.includes('OQ'); }
function blockers(t){ return depIds(t).filter(d => !doneIds.has(d)); }
function statusOf(t){
  if (doneIds.has(t.id)) return 'done';
  if (hasOpenDep(t)) return 'open';
  return blockers(t).length === 0 ? 'ready' : 'blocked';
}
function downstream(id){ return tasks.filter(t => depIds(t).includes(id)).map(t => t.id); }
function matches(t){
  const status = statusOf(t);
  const text = [t.id, t.title, t.kind, t.deliverable, t.done, t.effort].join(' ').toLowerCase();
  if (searchText && !text.includes(searchText.toLowerCase())) return false;
  if (kindFilter !== 'all' && t.kind !== kindFilter) return false;
  if (statusFilter !== 'all' && status !== statusFilter) return false;
  return true;
}
function esc(v){
  return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
}
function el(tag, cls, text){
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

/* ================= ジャーニーバー ================= */
function renderJourney(){
  const total = tasks.length;
  const done = tasks.filter(t => statusOf(t) === 'done').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('journeyLabel').textContent = `すごろく進行: 全${total}マス`;
  document.getElementById('journeyPct').textContent = `${done} / ${total} マス踏破 (${pct}%)`;
  document.getElementById('journeyFill').style.width = pct + '%';
  document.getElementById('journeySun').style.left = pct + '%';

  const track = document.getElementById('journeyTrack');
  track.querySelectorAll('.journey-flag').forEach(n => n.remove());
  let cum = 0;
  phases.forEach(p => {
    cum += tasks.filter(t => t.phase === p.id).length;
    const flag = el('span','journey-flag', p.emoji);
    flag.style.left = (cum / total * 100) + '%';
    track.appendChild(flag);
  });
}

/* ================= フィルタ ================= */
const kindChips = document.getElementById('kindChips');
const statusChips = document.getElementById('statusChips');

function renderFilters(){
  const kinds = ['決定済み','PoC必要','未確定','後回し'].filter(k => tasks.some(t => t.kind === k));
  const kindCounts = { all: tasks.length };
  kinds.forEach(k => kindCounts[k] = tasks.filter(t => t.kind === k).length);
  kindChips.innerHTML = ['all', ...kinds].map(k => {
    const label = k === 'all' ? `すべて (${kindCounts.all})` : `${KIND_META[k].emoji} ${k} (${kindCounts[k]})`;
    return `<button class="fchip ${kindFilter===k?'on':''}" data-kind="${k}" type="button">${label}</button>`;
  }).join('');
  kindChips.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { kindFilter = b.dataset.kind; render(); }));

  const statuses = ['ready','open','blocked','done'];
  const statusCounts = { all: tasks.length };
  statuses.forEach(s => statusCounts[s] = tasks.filter(t => statusOf(t) === s).length);
  statusChips.innerHTML = ['all', ...statuses].map(s => {
    const label = s === 'all' ? `進行: すべて` : `${STATUS_META[s].emoji} ${STATUS_META[s].label} (${statusCounts[s]})`;
    return `<button class="fchip ${statusFilter===s?'on':''}" data-status="${s}" type="button">${label}</button>`;
  }).join('');
  statusChips.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { statusFilter = b.dataset.status; render(); }));
}

/* ================= ボード ================= */
const board = document.getElementById('board');

function cardHtml(t){
  const status = statusOf(t);
  const classes = ['card'];
  if (status === 'done') classes.push('done');
  if (t.id === selectedId) classes.push('selected');
  else if (selectedId){
    const sel = taskMap.get(selectedId);
    if (sel){
      if (depIds(sel).includes(t.id)) classes.push('related-dep');
      else if (downstream(sel.id).includes(t.id)) classes.push('related-next');
    }
  }
  return `<button class="${classes.join(' ')}" type="button" data-task="${t.id}">
    <div class="card-top"><span class="card-id">${t.id}</span><span class="card-status">${STATUS_META[status].emoji}</span></div>
    <div class="card-title">${esc(t.title)}</div>
    <div class="card-deliv">📄 ${esc(t.deliverable)}</div>
    <div class="card-meta">
      <span class="tag kind-${esc(t.kind)}">${KIND_META[t.kind].emoji} ${esc(t.kind)}</span>
      <span class="tag">⏳ ${esc(t.effort)}人日</span>
    </div>
  </button>`;
}

function renderBoard(){
  board.innerHTML = phases.map(phase => {
    const laneTasks = tasks.filter(t => t.phase === phase.id);
    const done = laneTasks.filter(t => statusOf(t) === 'done').length;
    const visible = laneTasks.filter(matches);
    return `<section class="lane ${phase.dark ? 'dark' : ''}" style="--lc:${phase.color}" data-phase="${phase.id}">
      <div class="lane-head">
        <span class="lane-emoji">${phase.emoji}</span>
        <div class="lane-text">
          <h2>${esc(phase.name)} ・ ${esc(phase.title)}</h2>
          <p>${esc(phase.note)}</p>
        </div>
        <span class="lane-count">${done}/${laneTasks.length}</span>
      </div>
      <div class="lane-bar"><i style="width:${laneTasks.length ? Math.round(done/laneTasks.length*100) : 0}%"></i></div>
      <div class="lane-cards">
        ${visible.length ? visible.map(cardHtml).join('') : `<div class="empty-lane">条件に合うマスなし</div>`}
      </div>
    </section>`;
  }).join('');

  board.querySelectorAll('[data-task]').forEach(btn => {
    btn.addEventListener('click', () => openDetail(btn.dataset.task));
  });
}

function render(){
  renderJourney();
  renderFilters();
  renderBoard();
  if (selectedId) requestAnimationFrame(drawArrows);
}

/* ================= 依存ライン ================= */
const arrowsSvg = document.getElementById('arrows');

function drawArrows(){
  arrowsSvg.querySelectorAll('path.edge').forEach(n => n.remove());
  if (!selectedId) return;
  const t = taskMap.get(selectedId);
  if (!t) return;
  depIds(t).forEach(d => drawEdge(d, t.id, 'dep'));
  downstream(t.id).forEach(n => drawEdge(t.id, n, 'next'));
}
function drawEdge(fromId, toId, type){
  const a = document.querySelector(`[data-task="${CSS.escape(fromId)}"]`);
  const b = document.querySelector(`[data-task="${CSS.escape(toId)}"]`);
  if (!a || !b) return;
  const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
  if (ra.bottom < -40 || ra.top > innerHeight + 40 || rb.bottom < -40 || rb.top > innerHeight + 40) return;
  const x1 = ra.right, y1 = ra.top + ra.height/2;
  const x2 = rb.left, y2 = rb.top + rb.height/2;
  const dx = Math.max(40, Math.abs(x2 - x1) / 2);
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('class', 'edge');
  path.setAttribute('d', `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', type === 'dep' ? '#f0772b' : '#7c9eff');
  path.setAttribute('stroke-width', '2.5');
  path.setAttribute('stroke-dasharray', type === 'dep' ? '0' : '6 5');
  path.setAttribute('opacity', '0.85');
  path.setAttribute('marker-end', type === 'dep' ? 'url(#arrow-dep)' : 'url(#arrow-next)');
  arrowsSvg.appendChild(path);
}
let redrawTick = false;
function scheduleRedraw(){
  if (!selectedId || redrawTick) return;
  redrawTick = true;
  requestAnimationFrame(() => { drawArrows(); redrawTick = false; });
}
window.addEventListener('scroll', scheduleRedraw, { passive:true });
window.addEventListener('resize', scheduleRedraw);
document.addEventListener('scroll', e => { if (e.target !== document) scheduleRedraw(); }, { passive:true, capture:true });

/* ================= 詳細シート ================= */
const scrim = document.getElementById('scrim');
const sheet = document.getElementById('sheet');
const sheetBody = document.getElementById('sheetBody');

function closeDetail(){
  scrim.classList.remove('show');
  sheet.classList.remove('show');
  sheet.setAttribute('aria-hidden','true');
  selectedId = null;
  arrowsSvg.querySelectorAll('path.edge').forEach(n => n.remove());
  renderBoard();
}

function depChip(id, blocking){
  const t = taskMap.get(id);
  const label = t ? `${id} ${t.title}` : id;
  return `<button class="dep-chip ${blocking ? 'blocking' : ''}" type="button" data-jump="${id}">${esc(label)}</button>`;
}

function openDetail(id){
  const t = taskMap.get(id);
  if (!t) return;
  selectedId = id;
  renderBoard();

  const status = statusOf(t);
  const deps = depIds(t);
  const hasOQ = t.deps.includes('OQ');
  const next = downstream(t.id);
  const blockingNow = blockers(t);

  sheetBody.innerHTML = '';

  const head = el('div');
  head.innerHTML = `<span class="sub-id">${t.id}</span><h2>${esc(t.title)}</h2>`;
  sheetBody.appendChild(head);

  const meta = el('div','meta');
  meta.innerHTML = `
    <span class="tag kind-${esc(t.kind)}">${KIND_META[t.kind].emoji} ${esc(t.kind)}</span>
    <span class="tag">${STATUS_META[status].emoji} ${STATUS_META[status].label}</span>
    <span class="tag">⏳ ${esc(t.effort)}人日</span>
  `;
  sheetBody.appendChild(meta);

  const f1 = el('div','field');
  f1.innerHTML = `<span class="field-label">成果物</span><p class="field-value">📄 ${esc(t.deliverable)}</p>`;
  sheetBody.appendChild(f1);

  const f2 = el('div','field');
  f2.innerHTML = `<span class="field-label">完了条件</span><p class="field-value">${esc(t.done)}</p>`;
  sheetBody.appendChild(f2);

  const f3 = el('div','field');
  const depHtml = deps.length
    ? `<div class="card-meta">${deps.map(d => depChip(d, blockingNow.includes(d))).join('')}${hasOQ ? '<span class="tag kind-未確定">❓ OPEN_QUESTIONS</span>' : ''}</div>`
    : (hasOQ ? `<div class="card-meta"><span class="tag kind-未確定">❓ OPEN_QUESTIONS</span></div>` : '<span class="muted">なし</span>');
  f3.innerHTML = `<span class="field-label">依存関係（このマスより前）</span>${depHtml}`;
  sheetBody.appendChild(f3);

  const f4 = el('div','field');
  f4.innerHTML = `<span class="field-label">後続タスク（このマスより先）</span>${next.length ? `<div class="card-meta">${next.map(d => depChip(d, false)).join('')}</div>` : '<span class="muted">なし</span>'}`;
  sheetBody.appendChild(f4);

  if (hasOpenDep(t)){
    const f5 = el('div','field');
    f5.innerHTML = `<span class="field-label">未決ブロッカー</span><p class="field-value">${esc(openQuestionNote)}</p>`;
    sheetBody.appendChild(f5);
  }

  const toggle = el('label','toggle-row');
  toggle.innerHTML = `
    <span class="switch">
      <input type="checkbox" ${doneIds.has(t.id) ? 'checked' : ''}>
      <span class="track"></span>
      <span class="thumb"></span>
    </span>
    <span>このマスを踏破済みにする</span>
  `;
  const cb = toggle.querySelector('input');
  cb.addEventListener('change', () => {
    if (cb.checked){ doneIds.add(t.id); toast('🎉 踏破！'); }
    else { doneIds.delete(t.id); toast('未踏破に戻しました'); }
    localStorage.setItem(doneKey, JSON.stringify([...doneIds]));
    render();
    openDetail(t.id);
  });
  sheetBody.appendChild(toggle);

  sheetBody.querySelectorAll('[data-jump]').forEach(btn => {
    btn.addEventListener('click', () => openDetail(btn.dataset.jump));
  });

  scrim.classList.add('show');
  sheet.classList.add('show');
  sheet.setAttribute('aria-hidden','false');
  requestAnimationFrame(drawArrows);
}

scrim.addEventListener('click', closeDetail);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

/* ================= 検索 ================= */
document.getElementById('searchInput').addEventListener('input', e => {
  searchText = e.target.value;
  renderBoard();
  if (selectedId) requestAnimationFrame(drawArrows);
});

/* ================= トースト ================= */
function toast(msg){
  const wrap = document.getElementById('toastWrap');
  const t = el('div','toast', msg);
  wrap.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 320);
  }, 1600);
}

render();
</script>
