<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>コンパスボード 配置編集</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0d1130;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#0d1130;}
  #bar{
    position:fixed;left:12px;right:12px;top:calc(10px + env(safe-area-inset-top));z-index:10;
    display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;
  }
  #row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
  #row button,#row a{
    pointer-events:auto;border:0;border-radius:999px;padding:9px 14px;font-weight:800;font-size:13px;
    text-decoration:none;color:#fff;background:rgba(13,17,48,.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    box-shadow:0 6px 18px rgba(0,0,0,.25);line-height:1;cursor:pointer;
  }
  /* 状態トグル：色＋アイコン＋文言で「今どっちか」を示す */
  #lock{display:inline-flex;align-items:center;gap:7px;min-width:128px;justify-content:center;transition:background .15s ease;}
  #lock .ico{font-size:15px;line-height:1;}
  #lock.locked{background:linear-gradient(135deg,#5b6b9a,#3c4a78);}
  #lock.unlocked{background:linear-gradient(135deg,#06d6a0,#1f9e76);}
  #save{background:linear-gradient(135deg,#ff9f43,#f0772b);}
  #caption{
    pointer-events:none;color:#e8ecff;background:rgba(13,17,48,.72);
    padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:.95;max-width:92vw;text-align:center;
  }
</style>
</head>
<body>
<iframe id="app" src="./index.html" title="コンパスボード"></iframe>
<div id="bar">
  <div id="row">
    <button id="lock" class="locked" type="button"><span class="ico">🔒</span><span id="lockText">ロック中</span></button>
    <button id="save" type="button">保存</button>
    <a href="./index.html">通常画面</a>
  </div>
  <div id="caption">カードは固定 ／ タップで詳細。動かすにはロックを解除</div>
</div>
<script>
'use strict';
const frame = document.getElementById('app');
const lockBtn = document.getElementById('lock');
const lockText = document.getElementById('lockText');
const lockIco = lockBtn.querySelector('.ico');
const saveBtn = document.getElementById('save');
const captionEl = document.getElementById('caption');

// 既定はロック（安全・動かない）。解除したときだけ移動できる。
let locked = true;
let injected = false;
let savedTimer = null;

const CAP_LOCKED = 'カードは固定 ／ タップで詳細。動かすにはロックを解除';
const CAP_MOVE   = 'ドラッグで移動・指を離すと自動保存 ／ タップで詳細。固定するにはロック';

function injectFix(){
  if (injected) return;
  const win = frame.contentWindow;
  const doc = frame.contentDocument;
  if (!win || !doc || !doc.body) return;
  injected = true;
  const script = doc.createElement('script');
  script.textContent = `
(function(){
  if (window.__compassArrangeFixInstalled) return;
  window.__compassArrangeFixInstalled = true;

  var locked = true;          // index.html 内での状態（外側と同期）
  var cur = null;             // 進行中のカード操作
  var activePointers = new Set();
  var MOVE_THRESHOLD = 9;

  function boardEl(){ return document.getElementById('board'); }

  // 表示縮尺（CSS zoom や画面リサイズに毎回追従）。offsetWidth は zoom の影響を受けないため scale≈現在のzoom。
  function boardScale(){
    var board = boardEl();
    if (!board) return 1;
    var rect = board.getBoundingClientRect();
    var baseW = board.offsetWidth || parseFloat(board.style.width) || rect.width || 1;
    var scale = rect.width / baseW;
    return (isFinite(scale) && scale > 0) ? scale : 1;
  }
  // 画面座標 → ボード内座標
  function boardPoint(ev){
    var board = boardEl();
    var rect = board.getBoundingClientRect();
    var scale = boardScale();
    return { x: (ev.clientX - rect.left) / scale, y: (ev.clientY - rect.top) / scale };
  }
  function getCardById(id){ try { return state.cards.find(function(c){return c.id===id;}); } catch(e){ return null; } }
  function getMetrics(){ try { if (!metrics) renderBoard(); return metrics; } catch(e){ return null; } }

  function clearCur(render){
    if (!cur) return;
    var el = cur.el, pid = cur.pointerId;
    if (el) el.classList.remove('arrange-dragging');
    try { el.releasePointerCapture(pid); } catch(e){}
    cur = null;
    if (render){ try { renderBoard(); } catch(e){} }
  }

  // .card への pointerdown を奪取し、index.html 純正のドラッグ（zoom無視で飛ぶ版）を無効化する。
  function takeOverCard(ev){
    if (ev.button !== 0 && ev.pointerType === 'mouse') return false;
    var el = ev.target.closest && ev.target.closest('.card');
    if (!el) return false;
    var card = getCardById(el.dataset.id);
    var mt = getMetrics();
    if (!card || !mt) return false;
    ev.preventDefault(); ev.stopPropagation(); ev.stopImmediatePropagation();
    var phase = mt.list.find(function(x){ return x.p.id === card.phaseId; }) || mt.list[0];
    var startGX = phase.off + (card.x || 0);
    var startGY = card.y || 0;
    var p = boardPoint(ev);
    cur = {
      pointerId: ev.pointerId, el: el, card: card,
      startClientX: ev.clientX, startClientY: ev.clientY,
      offsetX: p.x - startGX, offsetY: p.y - startGY,
      gx: startGX, gy: startGY, dragging: false, moved: false
    };
    try { el.setPointerCapture(ev.pointerId); } catch(e){}
    return true;
  }

  document.addEventListener('pointerdown', function(ev){
    activePointers.add(ev.pointerId);
    // 2本目の指＝ピンチ。カード操作を中断し、空き領域でのズームに委ねる。
    if (activePointers.size >= 2){ clearCur(false); return; }
    takeOverCard(ev);
  }, true);

  document.addEventListener('pointermove', function(ev){
    if (!cur || ev.pointerId !== cur.pointerId) return;
    if (activePointers.size >= 2){ clearCur(false); return; }
    var dx = ev.clientX - cur.startClientX, dy = ev.clientY - cur.startClientY;
    if (Math.hypot(dx, dy) > MOVE_THRESHOLD) cur.moved = true;
    if (locked) return;            // ロック中は絶対に動かさない
    if (!cur.moved) return;        // しきい値を越えるまで待つ（タップ誤動作防止）
    ev.preventDefault(); ev.stopPropagation(); ev.stopImmediatePropagation();
    if (!cur.dragging){ cur.dragging = true; cur.el.classList.add('arrange-dragging'); }
    var mt = getMetrics(); if (!mt) return;
    var p = boardPoint(ev);
    var gx = p.x - cur.offsetX, gy = p.y - cur.offsetY;
    gx = Math.max(6, Math.min(gx, mt.total - 120));
    gy = Math.max(48, Math.min(gy, mt.boardH - 70));
    cur.gx = gx; cur.gy = gy;
    cur.el.style.left = gx + 'px';
    cur.el.style.top = gy + 'px';
  }, true);

  document.addEventListener('pointerup', function(ev){
    activePointers.delete(ev.pointerId);
    if (!cur || ev.pointerId !== cur.pointerId) return;
    ev.preventDefault(); ev.stopPropagation(); ev.stopImmediatePropagation();
    var wasDragging = cur.dragging, moved = cur.moved;
    var card = cur.card, el = cur.el, gx = cur.gx, gy = cur.gy;
    if (wasDragging){
      var mt = getMetrics();
      if (mt && gx != null){
        var centerX = gx + (el.offsetWidth || 160) / 2;
        var phase = mt.list.find(function(x){ return centerX >= x.off && centerX < x.off + x.w; }) || mt.list[mt.list.length - 1];
        card.phaseId = phase.p.id;
        card.x = Math.max(6, gx - phase.off);
        card.y = gy;
        try { touchCard(card); } catch(e){ card.updatedAt = new Date().toISOString(); }
        try { save(); } catch(e){ try { localStorage.setItem('compassBoard.v1', JSON.stringify(state)); } catch(err){} }
      }
      clearCur(false);
      try { renderBoard(); } catch(e){}
    } else if (!moved){
      // 移動していない＝タップ。ロック中・移動モードどちらでも詳細を開ける。
      clearCur(false);
      try { handleCardTap(card, ev); } catch(e){}
    } else {
      clearCur(false);
    }
  }, true);

  document.addEventListener('pointercancel', function(ev){
    activePointers.delete(ev.pointerId);
    if (cur && ev.pointerId === cur.pointerId) clearCur(true);
  }, true);

  var style = document.createElement('style');
  style.textContent = ''
    + '.card{touch-action:none;}'
    + 'body.compass-move-mode .card{outline:2px dashed rgba(6,214,160,.9); cursor:grab;}'
    + 'body.compass-move-mode .card:active{cursor:grabbing;}'
    + '.card.arrange-dragging{transform:scale(1.04)!important; z-index:999!important; opacity:.96!important; transition:none!important;}';
  document.head.appendChild(style);

  window.__setCompassLock = function(v){
    locked = !!v;
    document.body.classList.toggle('compass-move-mode', !locked);
    if (locked) clearCur(false);
  };
  window.__saveCompassArrange = function(){
    try { save(); return true; }
    catch(e){ try { localStorage.setItem('compassBoard.v1', JSON.stringify(state)); return true; } catch(err){ return false; } }
  };
  window.__compassReady = true;
})();
  `;
  doc.body.appendChild(script);
}

function applyLock(){
  injectFix();
  const win = frame.contentWindow;
  if (win && typeof win.__setCompassLock === 'function') win.__setCompassLock(locked);
  lockBtn.classList.toggle('locked', locked);
  lockBtn.classList.toggle('unlocked', !locked);
  lockIco.textContent = locked ? '🔒' : '🖐';
  lockText.textContent = locked ? 'ロック中' : '移動モード';
  if (savedTimer == null) captionEl.textContent = locked ? CAP_LOCKED : CAP_MOVE;
}

frame.addEventListener('load', () => {
  injected = false;
  setTimeout(() => { injectFix(); applyLock(); }, 250);
});

lockBtn.addEventListener('click', () => { locked = !locked; applyLock(); });

saveBtn.addEventListener('click', () => {
  injectFix();
  const win = frame.contentWindow;
  const ok = win && typeof win.__saveCompassArrange === 'function' ? win.__saveCompassArrange() : false;
  captionEl.textContent = ok ? '保存しました ✅' : '保存に失敗しました';
  if (savedTimer) clearTimeout(savedTimer);
  savedTimer = setTimeout(() => { savedTimer = null; applyLock(); }, 1400);
});
</script>
</body>
</html>
